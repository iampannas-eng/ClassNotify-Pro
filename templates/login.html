<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Login - ClassNotify Pro</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .login-box {
            background: #1a1a1a;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        label {
            font-size: 14px;
            color: #cccccc;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: none;
            background: #2a2a2a;
            color: white;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            background: #333333;
            box-shadow: 0 0 5px #4f9cff;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #4f9cff;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #3b82f6;
        }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>ClassNotify Pro</h2>

        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>
        </form>
        <div class="footer-text">
            <br>
            © 2026 ClassNotify Pro.<br>
            Produced by PunYaOn coding team.
            <br/>
        </div>
    </div>

</body>
</html>
